format = """
$directory\
[оӮҙ](fg:#3c4048 bg:#5ea1ff)\
$git_branch\
$git_status\
[оӮҙ](fg:#5ea1ff bg:#3c4048)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#3c4048 bg:#1d2230)\
$time\
[оӮҙ ](fg:#1d2230)\
$character"""

[directory]
style = "fg:#ffffff bg:#3c4048"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "пңҳ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#5ea1ff"
format = '[[ $symbol $branch ](fg:#ffffff bg:#5ea1ff)]($style)'

[git_status]
style = "bg:#5ea1ff"
format = '[[($all_status$ahead_behind )](fg:#ffffff bg:#5ea1ff)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#3c4048"
format = '[[ $symbol ($version) ](fg:#ffffff bg:#3c4048)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#3c4048"
format = '[[ $symbol ($version) ](fg:#ffffff bg:#3c4048)]($style)'

[golang]
symbol = "пі‘"
style = "bg:#3c4048"
format = '[[ $symbol ($version) ](fg:#ffffff bg:#3c4048)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#3c4048"
format = '[[ $symbol ($version) ](fg:#ffffff bg:#3c4048)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ пҗә  $time ](fg:#a0a9cb bg:#1d2230)]($style)'
